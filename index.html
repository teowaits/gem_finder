<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gem Finder</title>
    <meta name="description" content="Discover recent preprints on arXiv and chemRxiv for editorial acquisition." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { background-color: #0d111c; color: #e2e8f0; }
      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0d111c; }
      ::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #4a5568; }
      @keyframes gemSpin {
        to { transform: rotate(360deg); }
      }
      @keyframes gemIndeterminate {
        0%   { margin-left: -35%; }
        100% { margin-left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
